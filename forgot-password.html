<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Silencer | Forgot Password</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-btn {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 30px;
            transition: color 0.3s ease;
        }

        .back-btn:hover {
            color: white;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 50px;
            display: block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .logo h1 {
            color: white;
            font-size: 22px;
            margin-top: 10px;
        }

        .logo p {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            margin-bottom: 8px;
            display: block;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: #e94560;
            background: rgba(255,255,255,0.12);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #e94560, #0f3460);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(233, 69, 96, 0.4);
        }

        .success-msg {
            display: none;
            text-align: center;
            padding: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .success-msg .check {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .success-msg h2 {
            color: #00ff88;
            margin-bottom: 10px;
        }

        .success-msg p {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .signin-link {
            display: block;
            text-align: center;
            color: #e94560;
            text-decoration: none;
            margin-top: 20px;
            font-size: 14px;
        }

        .signin-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← Back to Login</a>

        <div class="logo">
            <span class="logo-icon">🔑</span>
            <h1>Forgot Password?</h1>
            <p>Enter your email and we'll send you a reset link</p>
        </div>

        <div id="formSection">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="emailInput" placeholder="your@email.com">
            </div>
            <button class="btn" onclick="sendReset()">Send Reset Link</button>
            <a href="index.html" class="signin-link">Remember your password? Sign In</a>
        </div>

        <div class="success-msg" id="successMsg">
            <div class="check">✅</div>
            <h2>Email Sent!</h2>
            <p>We sent a password reset link to your email. Check your inbox and follow the instructions.</p>
            <button class="btn" onclick="window.location.href='index.html'">Back to Login</button>
        </div>
    </div>

    <script>
        function sendReset() {
            const email = document.getElementById('emailInput').value;
            if (email === '') {
                alert('Please enter your email address!');
                return;
            }
            document.getElementById('formSection').style.display = 'none';
            document.getElementById('successMsg').style.display = 'block';
        }
    </script>
</body>
</html>
