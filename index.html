<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Silencer | Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 50px;
            animation: pulse 2s infinite;
            display: block;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .logo h1 {
            color: white;
            font-size: 24px;
            margin-top: 10px;
        }

        .logo p {
            color: rgba(255,255,255,0.5);
            font-size: 13px;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 5px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            color: rgba(255,255,255,0.5);
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tab.active {
            background: #e94560;
            color: white;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            margin-bottom: 8px;
            display: block;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #e94560;
            background: rgba(255,255,255,0.12);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #e94560, #0f3460);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(233, 69, 96, 0.4);
        }

        .google-btn {
            width: 100%;
            padding: 12px;
            background: white;
            color: #333;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .forgot {
            text-align: right;
            margin-top: -10px;
            margin-bottom: 15px;
        }

        .forgot a {
            color: #e94560;
            font-size: 12px;
            text-decoration: none;
        }

        .divider {
            text-align: center;
            color: rgba(255,255,255,0.3);
            margin: 15px 0;
            font-size: 12px;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <span class="logo-icon">🚗</span>
            <h1>Auto-Silencer</h1>
            <p>Drive safe, stay silent</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="showTab('signin', this)">Sign In</div>
            <div class="tab" onclick="showTab('signup', this)">Sign Up</div>
        </div>

        <!-- SIGN IN -->
        <div class="form-section active" id="signin">
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••">
            </div>
            <div class="forgot">
                <a href="#">Forgot password?</a>
            </div>
            <button class="btn" onclick="signIn()">Sign In</button>
            <div class="divider">or</div>
            <button class="google-btn">
                <img src="https://www.google.com/favicon.ico" width="20">
                Continue with Google
            </button>
        </div>

        <!-- SIGN UP -->
        <div class="form-section" id="signup">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Your full name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="••••••••">
            </div>
            <button class="btn">Create Account</button>
            <div class="divider">or</div>
            <button class="google-btn">
                <img src="https://www.google.com/favicon.ico" width="20">
                Sign up with Google
            </button>
        </div>
    </div>

    <script>
        function showTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
    el.classList.add('active');
}

function signIn() {
    const email = document.querySelector('#signin input[type="email"]').value;
    const password = document.querySelector('#signin input[type="password"]').value;
    
    if (email === '' || password === '') {
        alert('Please enter your email and password!');
        return;
    }
    
    window.location.href = 'dashboard.html';
}
    </script>
</body>
</html>
