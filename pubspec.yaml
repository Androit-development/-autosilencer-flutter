name: driving_auto_silencer
description: "AutoSilencer — Driving Mode Auto-Silencer. SE 3242, ICT University."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management — MVVM ViewModel pattern
  provider: ^6.1.5

  # Space Grotesk + Manrope fonts (from Stitch design)
  google_fonts: ^6.2.1

  # Accelerometer sensor
  sensors_plus: ^6.1.1

  # Microphone noise level
  noise_meter: ^5.0.2

  # Phone permissions
  permission_handler: ^11.3.1

  # Supabase backend (Sprint 2)
  supabase_flutter: ^2.8.4

  # Bilingual support
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true