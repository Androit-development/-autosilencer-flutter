name: driving_auto_silencer
description: "AutoSilencer — Driving Mode Auto-Silencer. SE 3242, ICT University."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # App icons
  cupertino_icons: ^1.0.8

  # ── State management (Provider / MVVM) ──────────────────────────
  provider: ^6.1.5

  # ── Fonts (Space Grotesk + Manrope) ────────────────────────────
  google_fonts: ^6.2.1

  # ── Supabase (cloud database + auth) ───────────────────────────
  supabase_flutter: ^2.8.4

  # ── Environment variables (.env file) ──────────────────────────
  flutter_dotenv: ^5.2.1

  # ── Sensors ─────────────────────────────────────────────────────
  sensors_plus: ^6.1.1
  noise_meter: ^5.0.2

  # ── Permissions (microphone, etc.) ──────────────────────────────
  permission_handler: ^11.3.1
  google_sign_in: ^7.2.0
  shared_preferences: ^2.5.5

  # ── Bilingual support ────────────────────────────────────────────
  flutter_localizations:
    sdk: flutter
  flutter_foreground_task: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true